<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لـ نن عيني💗😍</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
}

.bg-hearts{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;
}

.heart{
position:absolute;
width:20px;
height:20px;
background:rgba(255,255,255,0.6);
transform:rotate(45deg);
animation:float 6s linear infinite;
}

.heart::before,.heart::after{
content:"";
position:absolute;
width:20px;
height:20px;
background:inherit;
border-radius:50%;
}

.heart::before{top:-10px;}
.heart::after{left:-10px;}

@keyframes float{
0%{transform:translateY(100vh) rotate(45deg);opacity:0;}
50%{opacity:.8;}
100%{transform:translateY(-50px) rotate(45deg);opacity:0;}
}

.bg-eid{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;
display:none;
}

.star{
position:absolute;
color:white;
font-size:20px;
animation:starMove 6s ease-in-out infinite;
}

@keyframes starMove{
0%{transform:translateY(0px);}
50%{transform:translateY(20px);}
100%{transform:translateY(0px);}
}

.moon{
position:absolute;
font-size:60px;
top:30px;
right:30px;
animation:starMove 6s ease-in-out infinite;
}

.card{
background:rgba(255,255,255,.3);
backdrop-filter:blur(8px);
border-radius:20px;
padding:20px 40px;
text-align:center;
width:500px;
max-width:90%;
overflow:auto;
max-height:80vh;
box-shadow:0 8px 32px rgba(0,0,0,.2);
}

h1{color:#d6336c;margin-bottom:20px;}

.message-box{
font-size:1.3rem;
line-height:1.2;
font-weight:700;
white-space:pre-wrap;
max-height:60vh;
overflow-y:auto;
text-align:right;
}

input{
width:80%;
padding:10px;
border:2px solid #d6336c;
border-radius:10px;
text-align:center;
font-size:1rem;
margin:15px 0;
}

.btn{
padding:10px 25px;
background:#d6336c;
color:#fff;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:700;
}

.hidden{display:none;}

.countdown-box{
font-size:5rem;
color:#d6336c;
}

.eid-background{
background:linear-gradient(135deg,#89CFF0,#B3E5FC);
}

.eid-card{
background:rgba(255,255,255,.3);
backdrop-filter:blur(8px);
border-radius:20px;
padding:40px;
text-align:center;
width:500px;
max-width:90%;
min-height:300px;
}

.eid-title{
font-size:2.5rem;
color:#1b5e20;
}

.eid-message{
font-size:1.5rem;
margin-top:20px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="bg-hearts" id="heartsContainer"></div>
<div class="bg-eid" id="eidDecor"></div>

<div class="card" id="quizCard">
<h1>مفيش دخول غير لما تجاوبي صح</h1>
<div class="message-box"><span id="quizMessage"></span></div>
<input id="answerInput" placeholder="اكتبي الإجابة هنا">
<br>
<button class="btn" onclick="checkAnswer()">صح؟</button>
</div>

<div class="card hidden" id="waitingCard">
<h1>الصبر حلو 😍</h1>
<div class="message-box"><span id="waitingMessage"></span></div>
</div>

<div class="card hidden" id="mainCard">
<h1>😍💗</h1>
<div class="message-box" id="mainMessage"></div>
</div>

<div class="card hidden" id="countdownCard">
<h1> 😍اصبري لسا مخلصناش </h1>
<div class="countdown-box" id="countdownDisplay">10</div>
</div>

<div class="eid-card hidden" id="eidCard">
<h1 class="eid-title">عيد فطر سعيد 🌙</h1>
<div class="eid-message">
كل عيد واحنا سوا 🥹😍<br><br>
بحبك موت يا جوجو 😍
</div>
</div>

<script>

const correctAnswer="جني صبري";
const quizText="أيه أكتر حاجة ميدو بيحبها؟";
const waitingText=" صح طبعا ي مزتي 😍";

const mainText=`انا يمكن مبعرفش اعبر بالكلام دايماً بس الحقيقة اني بحبك بجد
انتي بسببك غيرتيلي حياتي
انتي غيرتي فيا حجات كتير اوي مش كلام بس والله
انتي غيرتيني كتير اوي وبشكرك علي ده فعلا

انتي مش بس حبيبتي
انتي روحي ومراتي وقلبي وأقرب شخص لقلبي

أنا بجد مبسوط إنك في حياتي
ومش عايز اخسرك لأي سبب

نفسي دايماً اشوفك مبسوطة
علشان فرحتك بالدنيا كلها

ويكفيني بس اني اكون سبب في ضحكتك او فرحتك

عارف اني بقول كلام كتير اوي
بتخليكي تكرهيني وبتخليكي تزعلي مني

بس انا والله ما بيبقا قصدي زعلك
ولا ببقا عايزك تزعلي

انا والله عايزك تبقي فرحانه العمر كلو

ويارب تسامحيني من قلبك
عل اي كلمه قلتها وزعلتك

بحبك يا جوجو🥹 💗`;

const quizMessage=document.getElementById("quizMessage");
const waitingMessage=document.getElementById("waitingMessage");
const mainMessage=document.getElementById("mainMessage");
const countdownDisplay=document.getElementById("countdownDisplay");

const answerInput=document.getElementById("answerInput");
const quizCard=document.getElementById("quizCard");
const waitingCard=document.getElementById("waitingCard");
const mainCard=document.getElementById("mainCard");
const countdownCard=document.getElementById("countdownCard");
const eidCard=document.getElementById("eidCard");
const body=document.body;

const eidDecor=document.getElementById("eidDecor");

function typeWriter(element,text,callback){
let i=0;
element.textContent="";
function addChar(){
if(i<text.length){
element.textContent+=text[i];
i++;
setTimeout(addChar,15);
}else if(callback){
callback();
}}
addChar();
}

function createHearts(){
const container=document.getElementById("heartsContainer");
for(let j=0;j<10;j++){
const heart=document.createElement("div");
heart.className="heart";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+4)+"s";
container.appendChild(heart);
}
}

function createStars(){
eidDecor.style.display="block";
for(let i=0;i<20;i++){
let star=document.createElement("div");
star.className="star";
star.innerHTML="⭐";
star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";
eidDecor.appendChild(star);
}
let moon=document.createElement("div");
moon.className="moon";
moon.innerHTML="🌙";
eidDecor.appendChild(moon);
}

window.onload=function(){
typeWriter(quizMessage,quizText);
createHearts();
}

function checkAnswer(){

const userAnswer=answerInput.value.trim();

if(userAnswer===correctAnswer){

quizCard.classList.add('hidden');
waitingCard.classList.remove('hidden');

typeWriter(waitingMessage,waitingText,()=>{

setTimeout(()=>{

waitingCard.classList.add('hidden');
mainCard.classList.remove('hidden');

typeWriter(mainMessage,mainText,startCountdown);

},500);

});

}

else{

let wrongMessages=["غلط!!!","اياكي تكلميني تاني 😒","بكرهك😒","مكنتش متخيل انك كدااااا 😔","ضيعتي ثقه ميدو ف الارض يجني "];

let wrongMessage=wrongMessages[Math.floor(Math.random()*wrongMessages.length)];

quizCard.classList.add('hidden');
waitingCard.classList.remove('hidden');

typeWriter(waitingMessage,wrongMessage,()=>{

setTimeout(()=>{

waitingCard.classList.add('hidden');
quizCard.classList.remove('hidden');
answerInput.value="";

},1000);

});

}

}

function startCountdown(){

let count=10;

countdownCard.classList.remove('hidden');
countdownDisplay.textContent=count;

const interval=setInterval(()=>{

count--;
countdownDisplay.textContent=count;

if(count<=0){
clearInterval(interval);
showEid();
}

},1000);

}

function showEid(){

countdownCard.classList.add('hidden');
mainCard.classList.add('hidden');
eidCard.classList.remove('hidden');
body.classList.add('eid-background');
createStars();

}

</script>

</body>
                   </html>
